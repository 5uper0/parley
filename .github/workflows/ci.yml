name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the demo image
        run: docker build -t parley .
      - name: Smoke-test the money-shot server
        run: |
          # no --rm, so container logs survive a crash for diagnosis
          docker run -d -p 8080:8080 --name parley-demo parley
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8080/ >/dev/null && break
            sleep 1
          done
          echo "--- container status ---"; docker ps -a --filter name=parley-demo
          echo "--- container logs ---"; docker logs parley-demo || true
          curl -sf http://127.0.0.1:8080/ | grep -qi 'parley' \
            || { echo "index page missing"; docker rm -f parley-demo; exit 1; }
          curl -sf "http://127.0.0.1:8080/api/run?recipe=p2p" | grep -q 'agreed' \
            || { echo "engine did not return an agreed decision"; docker rm -f parley-demo; exit 1; }
          docker rm -f parley-demo
